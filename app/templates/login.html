<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登入 · 智慧分割標記助手</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    .login-wrap {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    /* 背景漸層光暈 */
    .login-wrap::before,
    .login-wrap::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    .login-wrap::before {
      width: 460px; height: 460px;
      top: -140px; left: -120px;
      background: radial-gradient(circle, var(--accent), transparent 70%);
    }
    .login-wrap::after {
      width: 420px; height: 420px;
      bottom: -160px; right: -120px;
      background: radial-gradient(circle, #06C755, transparent 70%);
      opacity: 0.35;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      background: linear-gradient(180deg, rgba(26,34,48,0.92), rgba(20,27,38,0.92));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 36px 32px 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.02) inset;
      backdrop-filter: blur(8px);
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      margin: 0 auto 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), #3b7fe0);
      box-shadow: 0 8px 22px rgba(79,156,255,0.4);
    }
    .login-logo svg { width: 30px; height: 30px; color: #fff; }

    .login-card h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.3px;
    }
    .login-card .subtitle {
      margin: 6px 0 26px;
      text-align: center;
    }

    .login-card label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin: 16px 0 6px;
    }
    .login-card input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(15,20,25,0.7);
      border: 1px solid #28323f;
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .login-card input::placeholder { color: #55606f; }
    .login-card input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,156,255,0.18);
    }
    .login-card button {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), #3b7fe0);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.15s, filter 0.15s;
      box-shadow: 0 8px 20px rgba(79,156,255,0.32);
    }
    .login-card button:hover { filter: brightness(1.06); box-shadow: 0 10px 26px rgba(79,156,255,0.42); }
    .login-card button:active { transform: translateY(1px); }

    .login-error {
      margin-top: 16px;
      padding: 10px 12px;
      background: rgba(255, 84, 112, 0.12);
      border: 1px solid var(--danger);
      border-radius: 10px;
      color: var(--danger);
      font-size: 13px;
    }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0 4px;
      color: var(--muted);
      font-size: 12px;
    }
    .login-divider::before,
    .login-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #28323f, transparent);
    }
    .line-login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      background: #06C755;
      color: #fff;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.12s, box-shadow 0.15s, filter 0.15s;
      box-shadow: 0 8px 20px rgba(6,199,85,0.28);
    }
    .line-login-btn:hover { filter: brightness(1.05); box-shadow: 0 10px 26px rgba(6,199,85,0.4); }
    .line-login-btn:active { transform: translateY(1px); }
    .line-login-btn svg { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" method="post" action="{{ url_for('auth.do_login') }}">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <path d="M3 15l5-5 4 4 3-3 6 6" />
          <circle cx="8.5" cy="8.5" r="1.5" />
        </svg>
      </div>
      <h1>智慧分割標記助手</h1>
      <p class="subtitle">請登入以繼續</p>

      {% if request.args.get('next') %}
      <input type="hidden" name="next" value="{{ request.args.get('next') }}" />
      {% endif %}

      <label for="username">帳號</label>
      <input id="username" name="username" type="text" autocomplete="username" placeholder="請輸入帳號" autofocus required />

      <label for="password">密碼</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="請輸入密碼" required />

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <button type="submit">登入</button>

      <div class="login-divider"><span>或</span></div>
      <a class="line-login-btn" href="{{ url_for('auth.line_start') }}">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C6.48 2 2 5.69 2 10.23c0 4.07 3.55 7.48 8.35 8.12.32.07.77.21.88.49.1.25.06.64.03.9l-.14.85c-.04.25-.2.98.86.53s5.7-3.36 7.78-5.75C21.28 13.68 22 12.03 22 10.23 22 5.69 17.52 2 12 2z"/>
        </svg>
        使用 LINE 登入
      </a>
    </form>
  </div>
</body>
</html>
