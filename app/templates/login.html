<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登入 · 智慧分割標記助手</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--panel);
      border: 1px solid #28323f;
      border-radius: 12px;
      padding: 28px 24px;
    }
    .login-card h1 { margin: 0 0 4px; font-size: 20px; }
    .login-card .subtitle { margin: 0 0 20px; }
    .login-card label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 12px 0 6px;
    }
    .login-card input {
      width: 100%;
      padding: 10px 12px;
      background: #0f1419;
      border: 1px solid #28323f;
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .login-card button {
      width: 100%;
      margin-top: 20px;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    .login-card button:hover { filter: brightness(1.08); }
    .login-error {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(255, 84, 112, 0.12);
      border: 1px solid var(--danger);
      border-radius: 8px;
      color: var(--danger);
      font-size: 13px;
    }
    .login-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 4px;
      color: var(--muted);
      font-size: 12px;
    }
    .login-divider::before,
    .login-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #28323f;
    }
    .line-login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 12px;
      padding: 11px;
      background: #06C755;
      color: #fff;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
    }
    .line-login-btn:hover { filter: brightness(1.05); }
    .line-login-btn svg { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" method="post" action="{{ url_for('auth.do_login') }}">
      <h1>智慧分割標記助手</h1>
      <p class="subtitle">請登入以繼續</p>

      {% if request.args.get('next') %}
      <input type="hidden" name="next" value="{{ request.args.get('next') }}" />
      {% endif %}

      <label for="username">帳號</label>
      <input id="username" name="username" type="text" autocomplete="username" autofocus required />

      <label for="password">密碼</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <button type="submit">登入</button>
    </form>

    <div style="width:100%;max-width:360px;">
      <div class="login-divider"><span>或</span></div>
      <a class="line-login-btn" href="{{ url_for('auth.line_start') }}">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C6.48 2 2 5.69 2 10.23c0 4.07 3.55 7.48 8.35 8.12.32.07.77.21.88.49.1.25.06.64.03.9l-.14.85c-.04.25-.2.98.86.53s5.7-3.36 7.78-5.75C21.28 13.68 22 12.03 22 10.23 22 5.69 17.52 2 12 2z"/>
        </svg>
        使用 LINE 登入
      </a>
    </div>
  </div>
</body>
</html>
