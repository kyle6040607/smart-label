<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧分割標記助手</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <header>
    <div>
      <h1>智慧分割標記助手</h1>
      <p class="subtitle">SAM 驅動的 AI 影像標記 · 人機協作</p>
    </div>
    <div class="header-actions">
      {% if display_name %}<span class="hi">{{ display_name }}</span>{% endif %}
      {% if line_bound %}
        <span class="line-badge">已綁定 LINE</span>
      {% else %}
        <a class="btn-link line" href="{{ url_for('auth.line_start') }}">綁定 LINE</a>
      {% endif %}
      <a class="btn-link" href="{{ url_for('auth.logout') }}">登出</a>
    </div>
  </header>

  <main>
    <!-- 1. 上傳 -->
    <section class="panel">
      <h2 style="margin-bottom: 8px;">1 · 上傳照片</h2>
      <input type="file" id="fileInput" multiple accept="image/*" style="display: none;" />
      <div id="dropZone" class="drop-zone">
        <p>拖曳照片至此，或點選下方按鈕</p>
        <div style="display: flex; justify-content: center; gap: 8px; align-items: center;">
          <button id="selectFileBtn" type="button" class="btn-secondary">選擇檔案</button>
          <button id="uploadBtn" type="button">上傳</button>
        </div>
        <span class="hint" id="fileCountHint" style="display: block; margin-top: 8px;">尚未選擇檔案</span>
      </div>
      <!-- 批次管理控制條 -->
      <div class="batch-control-bar">
        <label id="selectAllImgsLabel" style="display: none; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; margin: 0;">
          <input type="checkbox" id="selectAllImgs" /> 全選
        </label>
        <div style="display: flex; gap: 8px; margin-left: auto;">
          <button id="toggleImgBatchModeBtn" class="btn-secondary" style="padding: 4px 10px; font-size: 12px;">批次管理</button>
          <button id="batchDelImgsBtn" class="btn-danger" style="padding: 4px 10px; font-size: 12px; display: none;" disabled>確認刪除</button>
          <button id="cancelImgBatchBtn" class="btn-secondary" style="padding: 4px 10px; font-size: 12px; display: none;">取消</button>
        </div>
      </div>
      <div id="thumbs" class="thumbs"></div>
    </section>

    <!-- 2. 標記畫布 -->
    <section class="panel">
      <h2>2 · 標記 / 分割</h2>
      <div class="toolbar">
        <button id="autoSegBtn" disabled>自動分割整張</button>
        <button id="drawBtn" disabled>✏️ 手動描邊</button>
        
        <!-- 自然語言分割 (YOLO-World) 控制區 -->
        <div class="text-seg-wrap" style="display: inline-flex; gap: 6px; margin: 0 10px; align-items: center;">
          <input type="text" id="textPromptInput" placeholder="輸入文字搜尋物件（如：飛機）" disabled 
                 style="padding: 6px 12px; border-radius: 6px; border: 1px solid #3f4e60; background: #1e293b; color: #fff; width: 220px;" />
          <button id="textSegBtn" disabled class="btn-link" style="background: #3b82f6; border: none; cursor: pointer; padding: 6px 12px; border-radius: 6px; color: white;">🔍 文字分割</button>
        </div>
        
        <span class="hint" id="modeHint">點物件做單點分割</span>
      </div>
      <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
        <div id="segmentLoading" class="canvas-loading" role="status" aria-live="polite" hidden>
          <div class="loading-content" style="display: flex; flex-direction: column; align-items: center; gap: 12px; width: 80%; max-width: 320px;">
            <div style="display: flex; align-items: center; gap: 10px;">
              <span class="spinner" aria-hidden="true"></span>
              <span id="segmentLoadingText">分割中…</span>
            </div>
            <div id="progressBarContainer" style="width: 100%; height: 6px; background: rgba(255, 255, 255, 0.15); border-radius: 3px; overflow: hidden; display: none;">
              <div id="progressBar" style="width: 0%; height: 100%; background: var(--accent); transition: width 0.2s ease; border-radius: 3px;"></div>
            </div>
            <span id="progressPercentText" style="font-size: 12px; color: var(--muted); display: none;">0%</span>
          </div>
        </div>
      </div>
    </section>

    <!-- 3. 審核佇列 + 統計 -->
    <aside class="panel side">
      <h2>3 · 審核與成果</h2>
      <div id="stats" class="stats"></div>

      <h3>已建立的類別</h3>
      <ul id="labelList" class="labels"></ul>

      <div style="margin-top: 20px; margin-bottom: 8px;">
        <h3 style="margin: 0; font-size: 13px; color: var(--muted);">低信心待審（標紅）</h3>
      </div>
      <!-- 批次管理控制條 -->
      <div class="batch-control-bar" style="margin-bottom: 8px;">
        <label id="selectAllSegsLabel" style="display: none; align-items: center; gap: 6px; font-size: 12px; cursor: pointer; margin: 0;">
          <input type="checkbox" id="selectAllSegs" /> 全選
        </label>
        <div style="display: flex; gap: 6px; margin-left: auto;">
          <button id="toggleSegBatchModeBtn" class="btn-secondary" style="padding: 3px 8px; font-size: 11px;">批次管理</button>
          <button id="batchDelSegsBtn" class="btn-danger" style="padding: 3px 8px; font-size: 11px; display: none;" disabled>確認刪除</button>
          <button id="cancelSegBatchBtn" class="btn-secondary" style="padding: 3px 8px; font-size: 11px; display: none;">取消</button>
        </div>
      </div>
      <ul id="reviewQueue" class="queue"></ul>

      <h3>匯出資料集</h3>
      <div class="export">
        <select id="exportFormat">
          <option value="coco">COCO（instance seg）</option>
          <option value="yolo">YOLOv8-seg</option>
          <option value="mask">Mask PNG（語意分割）</option>
        </select>
        <button id="exportBtn">下載 ZIP</button>
        <p class="hint">只匯出已標好類別的片段（圖 + 遮罩 + 標籤）</p>
      </div>
    </aside>
  </main>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
