<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>註冊 · 智慧分割標記助手</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    .login-wrap {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    .login-wrap::before,
    .login-wrap::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    .login-wrap::before {
      width: 460px; height: 460px;
      top: -140px; left: -120px;
      background: radial-gradient(circle, var(--accent), transparent 70%);
    }
    .login-wrap::after {
      width: 420px; height: 420px;
      bottom: -160px; right: -120px;
      background: radial-gradient(circle, #06C755, transparent 70%);
      opacity: 0.35;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      background: linear-gradient(180deg, rgba(26,34,48,0.92), rgba(20,27,38,0.92));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 36px 32px 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.02) inset;
      backdrop-filter: blur(8px);
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      margin: 0 auto 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), #3b7fe0);
      box-shadow: 0 8px 22px rgba(79,156,255,0.4);
    }
    .login-logo svg { width: 30px; height: 30px; color: #fff; }

    .login-card h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.3px;
    }
    .login-card .subtitle {
      margin: 6px 0 26px;
      text-align: center;
    }

    .login-card label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin: 16px 0 6px;
    }
    .login-card input {
      width: 100%;
      padding: 12px 14px;
      background: rgba(15,20,25,0.7);
      border: 1px solid #28323f;
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .login-card input::placeholder { color: #55606f; }
    .login-card input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,156,255,0.18);
    }
    .login-card button {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), #3b7fe0);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.15s, filter 0.15s;
      box-shadow: 0 8px 20px rgba(79,156,255,0.32);
    }
    .login-card button:hover { filter: brightness(1.06); box-shadow: 0 10px 26px rgba(79,156,255,0.42); }
    .login-card button:active { transform: translateY(1px); }

    .login-error {
      margin-top: 16px;
      padding: 10px 12px;
      background: rgba(255, 84, 112, 0.12);
      border: 1px solid var(--danger);
      border-radius: 10px;
      color: var(--danger);
      font-size: 13px;
    }

    /* 密碼規範即時檢查 */
    .pw-rules {
      list-style: none;
      margin: 8px 0 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 12px;
      color: var(--muted);
    }
    .pw-rules li::before {
      content: "○";
      display: inline-block;
      width: 18px;
      color: #55606f;
    }
    .pw-rules li.ok { color: #06C755; }
    .pw-rules li.ok::before { content: "✓"; color: #06C755; }

    .login-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .login-footer a { color: var(--accent); text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" method="post" action="{{ url_for('auth.do_register') }}" id="register-form">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <line x1="19" y1="8" x2="19" y2="14" />
          <line x1="16" y1="11" x2="22" y2="11" />
        </svg>
      </div>
      <h1>建立帳號</h1>
      <p class="subtitle">註冊智慧分割標記助手</p>

      <label for="ac">帳號</label>
      <input id="ac" name="ac" type="text" autocomplete="username"
             placeholder="請輸入帳號" value="{{ form.get('ac', '') }}" autofocus required />

      <label for="mail">Email</label>
      <input id="mail" name="mail" type="email" autocomplete="email"
             placeholder="name@example.com" value="{{ form.get('mail', '') }}" required />

      <label for="pw">密碼</label>
      <input id="pw" name="pw" type="password" autocomplete="new-password"
             placeholder="請輸入密碼" required />
      <ul class="pw-rules">
        <li id="rule-length">至少 8 個字元</li>
        <li id="rule-upper">至少一個大寫字母（A-Z）</li>
        <li id="rule-lower">至少一個小寫字母（a-z）</li>
        <li id="rule-special">至少一個特殊字元（如 !@#$%）</li>
      </ul>

      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <button type="submit">註冊</button>

      <div class="login-footer">
        已經有帳號了？<a href="{{ url_for('auth.login') }}">前往登入</a>
      </div>
    </form>
  </div>

  <script>
    (function () {
      var pw = document.getElementById("pw");
      var rules = [
        { el: document.getElementById("rule-length"),  re: /^.{8,}$/ },
        { el: document.getElementById("rule-upper"),   re: /[A-Z]/ },
        { el: document.getElementById("rule-lower"),   re: /[a-z]/ },
        { el: document.getElementById("rule-special"), re: /[^A-Za-z0-9]/ },
      ];

      function check() {
        var value = pw.value;
        var allOk = true;
        rules.forEach(function (rule) {
          var ok = rule.re.test(value);
          rule.el.classList.toggle("ok", ok);
          if (!ok) allOk = false;
        });
        return allOk;
      }

      pw.addEventListener("input", function () {
        check();
        pw.setCustomValidity("");
      });

      document.getElementById("register-form").addEventListener("submit", function (e) {
        if (!check()) {
          e.preventDefault();
          pw.setCustomValidity("密碼須至少 8 個字元，並包含至少一個大寫字母、一個小寫字母與一個特殊字元");
          pw.reportValidity();
        }
      });
    })();
  </script>
</body>
</html>
