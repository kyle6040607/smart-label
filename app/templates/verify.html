<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email 驗證 · 智慧分割標記助手</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <style>
    .login-wrap {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
    }
    .login-wrap::before,
    .login-wrap::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }
    .login-wrap::before {
      width: 460px; height: 460px;
      top: -140px; left: -120px;
      background: radial-gradient(circle, var(--accent), transparent 70%);
    }
    .login-wrap::after {
      width: 420px; height: 420px;
      bottom: -160px; right: -120px;
      background: radial-gradient(circle, #06C755, transparent 70%);
      opacity: 0.35;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      background: linear-gradient(180deg, rgba(26,34,48,0.92), rgba(20,27,38,0.92));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 36px 32px 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.02) inset;
      backdrop-filter: blur(8px);
    }

    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      margin: 0 auto 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), #3b7fe0);
      box-shadow: 0 8px 22px rgba(79,156,255,0.4);
    }
    .login-logo svg { width: 30px; height: 30px; color: #fff; }

    .login-card h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.3px;
    }
    .login-card .subtitle {
      margin: 6px 0 26px;
      text-align: center;
    }

    .code-input {
      width: 100%;
      padding: 14px;
      background: rgba(15,20,25,0.7);
      border: 1px solid #28323f;
      border-radius: 10px;
      color: var(--text);
      font-size: 24px;
      text-align: center;
      letter-spacing: 12px;
      font-variant-numeric: tabular-nums;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .code-input::placeholder { color: #55606f; letter-spacing: 4px; font-size: 14px; }
    .code-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,156,255,0.18);
    }

    .login-card button[type="submit"] {
      width: 100%;
      margin-top: 24px;
      padding: 12px;
      background: linear-gradient(135deg, var(--accent), #3b7fe0);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.15s, filter 0.15s;
      box-shadow: 0 8px 20px rgba(79,156,255,0.32);
    }
    .login-card button[type="submit"]:hover { filter: brightness(1.06); }
    .login-card button[type="submit"]:active { transform: translateY(1px); }

    .login-error {
      margin-top: 16px;
      padding: 10px 12px;
      background: rgba(255, 84, 112, 0.12);
      border: 1px solid var(--danger);
      border-radius: 10px;
      color: var(--danger);
      font-size: 13px;
    }
    .login-ok {
      margin-top: 16px;
      padding: 10px 12px;
      background: rgba(6, 199, 85, 0.12);
      border: 1px solid #06C755;
      border-radius: 10px;
      color: #06C755;
      font-size: 13px;
    }

    .resend-btn {
      width: 100%;
      margin-top: 12px;
      padding: 11px;
      background: transparent;
      color: var(--muted);
      border: 1px solid #28323f;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .resend-btn:hover { border-color: var(--accent); color: var(--accent); }

    .login-footer {
      margin-top: 20px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }
    .login-footer a { color: var(--accent); text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
      </div>
      <h1>輸入驗證碼</h1>
      <p class="subtitle">驗證碼已寄到 {{ masked_email }}<br />10 分鐘內有效</p>

      <form method="post" action="{{ url_for('auth.do_verify') }}">
        <input class="code-input" name="code" type="text" inputmode="numeric"
               pattern="\d{6}" maxlength="6" placeholder="6 位數驗證碼"
               autocomplete="one-time-code" autofocus required />

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}
        {% if resent %}
        <div class="login-ok">新的驗證碼已寄出 ✉️</div>
        {% endif %}

        <button type="submit">驗證</button>
      </form>

      <form method="post" action="{{ url_for('auth.resend_code') }}">
        <button class="resend-btn" type="submit">重寄驗證碼</button>
      </form>

      <div class="login-footer">
        信箱填錯了？<a href="{{ url_for('auth.register') }}">重新註冊</a>
        <span style="margin: 0 6px; opacity: 0.4;">|</span>
        <a href="{{ url_for('auth.login') }}">回登入頁</a>
      </div>
    </div>
  </div>
</body>
</html>
