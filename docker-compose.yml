services:
  web:
    build: .

    ports:
      - "5000:5000"

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/.venv

    depends_on:
      - db

    restart: unless-stopped

  db:
    image: mysql:8.0
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: sa
      MYSQL_DATABASE: smart_label_db
      MYSQL_USER: sa
      MYSQL_PASSWORD: sa
    volumes:
      - mysql_data:/var/lib/mysql
      - ./MySQL/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data: